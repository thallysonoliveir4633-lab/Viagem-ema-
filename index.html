<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ônibus 2 - EMA / ATALAIA</title>

<style>

body {
font-family: Arial;
text-align: center;
background: #f2f2f2;
}

h1 {
background: purple;
color: white;
padding: 10px;
}

.onibus {
display: grid;
grid-template-columns: repeat(4, 60px);
gap: 10px;
justify-content: center;
margin-top: 20px;
}

.cadeira {
width: 60px;
height: 60px;
background: purple;
color: white;
display: flex;
align-items: center;
justify-content: center;
border-radius: 10px;
cursor: pointer;
}

</style>
</head>

<body>

<h1>ÔNIBUS 2 – EMA / ATALAIA</h1>

<div class="onibus" id="onibus"></div>

<script>

let senha = "4633";

let onibus = document.getElementById("onibus");

for (let i = 1; i <= 50; i++) {

let div = document.createElement("div");
div.className = "cadeira";

let salvo = localStorage.getItem("cadeira"+i);

if (salvo) {
div.innerHTML = salvo;
} else {
div.innerHTML = i;
}

div.onclick = function () {

let ver = localStorage.getItem("cadeira"+i);

if (ver) {
alert("Cadeira ocupada por: " + ver);
} else {
alert("Cadeira livre");
}

let s = prompt("Senha para editar:");

if (s !== senha) {
return;
}

let nome = prompt("Nome:");

if (nome) {
localStorage.setItem("cadeira"+i, nome);
div.innerHTML = nome;
}

};

onibus.appendChild(div);

}

</script>

</body>
</html>
